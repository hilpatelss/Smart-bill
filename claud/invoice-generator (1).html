<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartBill Invoice Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 16px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #111; }
  p.sub { font-size: 13px; color: #555; margin-bottom: 24px; }

  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.10); padding: 28px 28px 24px; width: 100%; max-width: 660px; }

  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin: 18px 0 8px; }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
  label { font-size: 12px; color: #555; margin-bottom: 4px; }
  input, select, textarea {
    border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px;
    font-size: 13px; color: #111; background: #fafafa; outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: #333; background: #fff; }
  textarea { resize: vertical; min-height: 56px; font-family: Arial, sans-serif; }

  #items-container { margin-top: 6px; }
  .item-row {
    display: grid;
    grid-template-columns: 2fr 90px 70px 70px 28px;
    gap: 8px; align-items: center; margin-bottom: 8px;
  }
  .remove-btn {
    background: none; border: none; cursor: pointer; color: #bbb; font-size: 20px; padding: 0;
    line-height: 1; transition: color 0.15s; text-align: center;
  }
  .remove-btn:hover { color: #e00; }
  .item-header {
    display: grid;
    grid-template-columns: 2fr 90px 70px 70px 28px;
    gap: 8px; margin-bottom: 4px;
  }
  .item-header span { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }

  #add-item-btn {
    background: none; border: 1.5px dashed #bbb; border-radius: 6px; padding: 7px 14px;
    font-size: 13px; color: #666; cursor: pointer; margin-top: 4px; width: 100%;
    transition: border-color 0.15s, color 0.15s;
  }
  #add-item-btn:hover { border-color: #333; color: #111; }

  .divider { border: none; border-top: 1px solid #ececec; margin: 20px 0; }

  #generate-btn {
    width: 100%; padding: 13px; font-size: 15px; font-weight: 700;
    background: #111; color: #fff; border: none; border-radius: 8px;
    cursor: pointer; letter-spacing: 0.03em; margin-top: 20px;
    transition: background 0.15s;
  }
  #generate-btn:hover { background: #333; }

  .preview-notice { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
</style>
</head>
<body>

<h1>&#128203; SmartBill Invoice Generator</h1>
<p class="sub">Fill in the details below and click Generate PDF &mdash; black &amp; white output</p>

<div class="card">

  <div class="section-title">Store / Business</div>
  <div class="form-row">
    <div class="form-group">
      <label>Store Name</label>
      <input id="storeName" value="SmartBill Store">
    </div>
    <div class="form-group">
      <label>Tagline</label>
      <input id="tagline" value="Your trusted local shop">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Address</label>
      <input id="storeAddress" value="N-156, New Green City">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input id="storePhone" value="9265186613">
    </div>
    <div class="form-group">
      <label>GSTIN</label>
      <input id="storeGST" value="27AABCU9603R1ZM">
    </div>
  </div>

  <hr class="divider">

  <div class="section-title">Invoice Details</div>
  <div class="form-row">
    <div class="form-group">
      <label>Invoice #</label>
      <input id="invoiceNum" value="INV-5">
    </div>
    <div class="form-group">
      <label>Invoice Date</label>
      <input id="invoiceDate" type="date" value="2026-04-10">
    </div>
    <div class="form-group">
      <label>Due Date</label>
      <input id="dueDate" type="date" value="2026-04-25">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Payment Method</label>
      <select id="payMethod">
        <option value="Cash">Cash</option>
        <option value="Card">Card</option>
        <option value="UPI">UPI</option>
        <option value="Bank Transfer">Bank Transfer</option>
      </select>
    </div>
    <div class="form-group">
      <label>Payment Status</label>
      <select id="payStatus">
        <option value="Pending">Pending</option>
        <option value="Paid">Paid</option>
        <option value="Overdue">Overdue</option>
      </select>
    </div>
    <div class="form-group">
      <label>Discount (%)</label>
      <input id="discount" type="number" value="0" min="0" max="100">
    </div>
  </div>

  <hr class="divider">

  <div class="section-title">Billed To</div>
  <div class="form-row">
    <div class="form-group">
      <label>Customer Name</label>
      <input id="custName" value="Hil Patel">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input id="custPhone" value="9265186613">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input id="custEmail" value="hilpatelss@gmail.com">
    </div>
  </div>

  <hr class="divider">

  <div class="section-title">Items</div>
  <div class="item-header">
    <span>Product / Description</span>
    <span>Unit Price (Rs.)</span>
    <span>GST %</span>
    <span>Qty</span>
    <span></span>
  </div>
  <div id="items-container">
    <div class="item-row">
      <input class="item-name" value="Huio">
      <input class="item-price" type="number" value="18" min="0" step="0.01">
      <input class="item-gst" type="number" value="12" min="0" max="100">
      <input class="item-qty" type="number" value="1" min="1">
      <button class="remove-btn" onclick="removeItem(this)">&#215;</button>
    </div>
  </div>
  <button id="add-item-btn" onclick="addItem()">+ Add Item</button>

  <hr class="divider">

  <div class="section-title">Notes</div>
  <textarea id="notes">Thank you for your purchase! For queries, contact us at shop@SmartBill.in</textarea>

  <button id="generate-btn" onclick="generatePDF()">&#8595; Generate PDF</button>
  <p class="preview-notice">A black &amp; white invoice PDF will be downloaded to your device.</p>
</div>

<script>
function addItem() {
  const container = document.getElementById('items-container');
  const row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = `
    <input class="item-name" placeholder="Product name">
    <input class="item-price" type="number" value="0" min="0" step="0.01">
    <input class="item-gst" type="number" value="18" min="0" max="100">
    <input class="item-qty" type="number" value="1" min="1">
    <button class="remove-btn" onclick="removeItem(this)">&#215;</button>
  `;
  container.appendChild(row);
}

function removeItem(btn) {
  const rows = document.querySelectorAll('.item-row');
  if (rows.length > 1) btn.closest('.item-row').remove();
}

function fmtDate(val) {
  if (!val) return '';
  const [y, m, d] = val.split('-');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[parseInt(m)-1] + ' ' + parseInt(d) + ', ' + y;
}

function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });

  const pageW = 210;
  const pageH = 297;
  const ml = 14;
  const mr = pageW - 14;
  const contentW = mr - ml;

  // ─── HEADER ──────────────────────────────────────────────────
  doc.setFillColor(15, 15, 15);
  doc.rect(0, 0, pageW, 56, 'F');

  // Store name
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(17);
  doc.setTextColor(255, 255, 255);
  doc.text(document.getElementById('storeName').value, ml, 16);

  // Tagline
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.setTextColor(170, 170, 170);
  doc.text(document.getElementById('tagline').value, ml, 23);

  // Store details
  doc.setFontSize(8);
  doc.setTextColor(150, 150, 150);
  doc.text(document.getElementById('storeAddress').value, ml, 30);
  doc.text(document.getElementById('storePhone').value, ml, 36);
  doc.text(document.getElementById('storeGST').value, ml, 42);

  // INVOICE title right
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(26);
  doc.setTextColor(255, 255, 255);
  doc.text('INVOICE', mr, 18, { align: 'right' });

  // Invoice number
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(170, 170, 170);
  doc.text('#' + document.getElementById('invoiceNum').value, mr, 27, { align: 'right' });

  // Status
  const status = document.getElementById('payStatus').value;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.setTextColor(210, 210, 210);
  doc.text(status, mr, 37, { align: 'right' });

  // ─── META SECTION ─────────────────────────────────────────────
  let y = 68;
  const col2x = ml + contentW * 0.38;
  const col3x = ml + contentW * 0.68;

  // BILLED TO
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7.5);
  doc.setTextColor(120, 120, 120);
  doc.text('BILLED TO', ml, y);

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.setTextColor(15, 15, 15);
  doc.text(document.getElementById('custName').value, ml, y + 7);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(70, 70, 70);
  const cPhone = document.getElementById('custPhone').value;
  const cEmail = document.getElementById('custEmail').value;
  if (cPhone) doc.text('P: ' + cPhone, ml, y + 14);
  if (cEmail) doc.text(cEmail, ml, y + 20);

  // INVOICE DATE
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7.5);
  doc.setTextColor(120, 120, 120);
  doc.text('INVOICE DATE', col2x, y);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(15, 15, 15);
  doc.text(fmtDate(document.getElementById('invoiceDate').value), col2x, y + 7);

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7.5);
  doc.setTextColor(120, 120, 120);
  doc.text('DUE DATE', col2x, y + 14);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(15, 15, 15);
  doc.text(fmtDate(document.getElementById('dueDate').value), col2x, y + 21);

  // PAYMENT METHOD / STATUS
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7.5);
  doc.setTextColor(120, 120, 120);
  doc.text('PAYMENT METHOD', col3x, y);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(15, 15, 15);
  doc.text(document.getElementById('payMethod').value, col3x, y + 7);

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7.5);
  doc.setTextColor(120, 120, 120);
  doc.text('PAYMENT STATUS', col3x, y + 14);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.setTextColor(40, 40, 40);
  doc.text(status, col3x, y + 21);

  // ─── DIVIDER ──────────────────────────────────────────────────
  y += 33;
  doc.setDrawColor(210, 210, 210);
  doc.setLineWidth(0.3);
  doc.line(ml, y, mr, y);
  y += 8;

  // ─── TABLE HEADER ─────────────────────────────────────────────
  doc.setFillColor(240, 240, 240);
  doc.rect(ml, y - 5.5, contentW, 9, 'F');

  // column x positions
  const c0 = ml;           // #
  const c1 = ml + 10;      // Product
  const c2 = ml + 10 + contentW * 0.42; // Unit price
  const c3 = c2 + 36;      // GST%
  const c4 = c3 + 22;      // Qty

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7.5);
  doc.setTextColor(100, 100, 100);
  doc.text('#', c0, y);
  doc.text('PRODUCT / DESCRIPTION', c1, y);
  doc.text('UNIT PRICE', c2, y);
  doc.text('GST %', c3, y);
  doc.text('QTY', c4, y);
  doc.text('TOTAL', mr, y, { align: 'right' });

  y += 5;
  doc.setDrawColor(210, 210, 210);
  doc.setLineWidth(0.25);
  doc.line(ml, y, mr, y);
  y += 7;

  // ─── LINE ITEMS ───────────────────────────────────────────────
  const itemRows = document.querySelectorAll('.item-row');
  let subtotal = 0;
  let totalGST = 0;

  itemRows.forEach(function(row, i) {
    const name  = row.querySelector('.item-name').value  || '-';
    const price = parseFloat(row.querySelector('.item-price').value) || 0;
    const gst   = parseFloat(row.querySelector('.item-gst').value)   || 0;
    const qty   = parseInt(row.querySelector('.item-qty').value)      || 1;
    const gstAmt = price * (gst / 100) * qty;
    const total  = price * qty + gstAmt;
    subtotal += price * qty;
    totalGST += gstAmt;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(100, 100, 100);
    doc.text(String(i + 1), c0, y);

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(15, 15, 15);
    doc.text(name, c1, y);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9.5);
    doc.setTextColor(20, 20, 20);
    doc.text('Rs.' + price.toFixed(2), c2, y);
    doc.text(gst + '%', c3, y);
    doc.text(String(qty), c4, y);

    doc.setFont('helvetica', 'bold');
    doc.text('Rs.' + total.toFixed(2), mr, y, { align: 'right' });

    y += 5;
    doc.setDrawColor(230, 230, 230);
    doc.setLineWidth(0.2);
    doc.line(ml, y, mr, y);
    y += 8;
  });

  // ─── TOTALS ───────────────────────────────────────────────────
  y += 4;
  const discPct = parseFloat(document.getElementById('discount').value) || 0;
  const discAmt = subtotal * (discPct / 100);
  const grandTotal = subtotal + totalGST - discAmt;
  const totLabelX = mr - 82;

  function drawRow(label, value, isBold) {
    doc.setFont('helvetica', isBold ? 'bold' : 'normal');
    doc.setFontSize(isBold ? 11 : 9.5);
    doc.setTextColor(isBold ? 10 : 80, isBold ? 10 : 80, isBold ? 10 : 80);
    doc.text(label, totLabelX, y);
    doc.text('Rs.' + Math.abs(value).toFixed(2) + (value < 0 ? ' CR' : ''), mr, y, { align: 'right' });
    y += 8;
  }

  drawRow('Subtotal', subtotal, false);
  drawRow('GST Amount', totalGST, false);
  drawRow('Discount (' + discPct + '%)', discAmt > 0 ? -discAmt : 0, false);

  // total bar
  doc.setFillColor(15, 15, 15);
  doc.roundedRect(totLabelX - 5, y - 6, mr - totLabelX + 9, 11, 2, 2, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(255, 255, 255);
  doc.text('Total Amount', totLabelX, y);
  doc.text('Rs.' + grandTotal.toFixed(2), mr - 2, y, { align: 'right' });
  y += 18;

  // ─── NOTES ────────────────────────────────────────────────────
  const notes = document.getElementById('notes').value.trim();
  if (notes) {
    const noteLines = doc.splitTextToSize(notes, contentW - 12);
    const noteH = 16 + noteLines.length * 5;
    doc.setFillColor(248, 248, 248);
    doc.setDrawColor(210, 210, 210);
    doc.setLineWidth(0.3);
    doc.roundedRect(ml, y, contentW, noteH, 3, 3, 'FD');

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8.5);
    doc.setTextColor(70, 70, 70);
    doc.text('NOTES', ml + 5, y + 7);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8.5);
    doc.setTextColor(100, 100, 100);
    doc.text(noteLines, ml + 5, y + 14);
  }

  // ─── FOOTER ───────────────────────────────────────────────────
  doc.setFont('helvetica', 'italic');
  doc.setFontSize(8);
  doc.setTextColor(160, 160, 160);
  doc.text('This is a computer-generated invoice. No signature required.', pageW / 2, pageH - 10, { align: 'center' });

  // ─── SAVE ─────────────────────────────────────────────────────
  const fname = 'invoice-' + document.getElementById('invoiceNum').value + '.pdf';
  doc.save(fname);
}
</script>
</body>
</html>
